# Labeler configuration for automatic PR labelling
# Documentation: https://github.com/actions/labeler

# ─── Source code ────────────────────────────────────────────────────────────
python:
  - changed-files:
      - any-glob-to-any-file:
          - "src/**/*.py"
          - "tests/**/*.py"
          - "pyproject.toml"
          - "uv.lock"

# ─── Docker ──────────────────────────────────────────────────────────────────
docker:
  - changed-files:
      - any-glob-to-any-file:
          - "Dockerfile"
          - ".dockerignore"

# ─── CI/CD ───────────────────────────────────────────────────────────────────
ci:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"
          - ".github/dependabot.yml"
          - "release-please-config.json"
          - ".release-please-manifest.json"

# ─── Documentation ───────────────────────────────────────────────────────────
documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "README.md"
          - "CHANGELOG.md"
          - "docs/**"

# ─── Configuration ───────────────────────────────────────────────────────────
configuration:
  - changed-files:
      - any-glob-to-any-file:
          - "config/**"
          - "pyproject.toml"

# ─── GitHub templates & settings ─────────────────────────────────────────────
github:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - ".gitignore"
          - ".ruffignore"